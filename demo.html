<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book a Demo — Team</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* Nyght Serif */
@font-face { font-family: "Nyght Serif"; font-weight: 500; font-style: italic; font-display: swap; src: url("https://raw.githubusercontent.com/siteamrollouts/team-nomorechaos/main/NyghtSerif-MediumItalic.woff2") format("woff2"); }
@font-face { font-family: "Nyght Serif"; font-weight: 300; font-style: italic; font-display: swap; src: url("https://raw.githubusercontent.com/siteamrollouts/team-nomorechaos/main/NyghtSerif-LightItalic.woff2") format("woff2"); }
.nyght { font-family: "Nyght Serif", Georgia, serif; font-style: italic; font-weight: 300; }
</style>
<style>
/* =============================================
   RESET & TOKENS
   ============================================= */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none}
html{scroll-behavior:auto;scrollbar-gutter:stable}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  color:#111110;background:var(--black);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
:root{
  --black:#191919;--white:#fff;--grey:#E0E0E0;--bg:#FAFAFA;
  --accent:#F56002;--text-secondary:#454545;
  --ease:cubic-bezier(0.16,1,0.3,1);
}

/* =============================================
   TYPOGRAPHY
   ============================================= */
.headline-xl{font-size:clamp(2.5rem,5.5vw,4.5rem);font-weight:300;line-height:1.05;letter-spacing:-0.03em}
.headline-lg{font-size:clamp(2rem,4vw,3.2rem);font-weight:400;line-height:1.1;letter-spacing:-0.02em}
.body-lg{font-size:1.125rem;font-weight:400;line-height:1.6;color:var(--text-secondary)}
.body-sm{font-size:0.875rem;line-height:1.5}
.label-sm{font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em}

/* =============================================
   BUTTONS
   ============================================= */
.btn{
  display:inline-flex;align-items:center;gap:0.5rem;
  font-size:0.875rem;font-weight:600;padding:0.75rem 1.25rem;
  border-radius:1.5rem;transition:background 0.3s,border-color 0.3s,color 0.3s,backdrop-filter 0.3s;
  cursor:pointer;
}
.btn--primary{
  background:var(--black);color:#fff;border:1px solid transparent;
  transition:all 0.3s ease;
}
.btn--primary:hover{
  color:#111 !important;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-color:rgba(255,255,255,0.5);
  box-shadow:0 2px 12px rgba(0,0,0,0.08);
}
.btn--primary-light{
  background:var(--black);color:#fff;border:1px solid transparent;
  transition:all 0.3s ease;
}
.btn--primary-light:hover{
  color:#111 !important;
  background:rgba(0,0,0,0.05);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-color:rgba(0,0,0,0.12);
  box-shadow:0 2px 12px rgba(0,0,0,0.06);
}
.btn--outline{background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.4)}
.btn--outline:hover{background:rgba(255,255,255,0.12);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-color:rgba(255,255,255,0.5)}
.btn--ghost{background:transparent;color:var(--black);border:1px solid var(--grey)}
.btn--ghost:hover{background:rgba(0,0,0,0.05);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-color:var(--black)}

/* =============================================
   NAV
   ============================================= */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  padding:0.875rem 2rem;
  display:flex;align-items:center;justify-content:space-between;
  max-width:80rem;margin:0 auto;
  transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
}
.nav.nav--hidden{transform:translateY(calc(-100% - 1rem))}
.nav__pill{
  display:flex;align-items:center;gap:0.25rem;
  padding:0.375rem 0.5rem;
  border-radius:100px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.1);
  transition:background 0.35s,border-color 0.35s,backdrop-filter 0.35s;
}
.nav--solid .nav__pill{
  background:rgba(255,255,255,0.95);
  border-color:rgba(0,0,0,0.06);
}
.nav__logo{display:flex;align-items:center;padding:0 0.5rem}
.nav__logo img{height:1.125rem;transition:filter 0.3s,opacity 0.3s}
.nav__logo .logo-light{position:absolute}
.nav__logo .logo-dark{opacity:0}
.nav--solid .nav__logo .logo-light{opacity:0}
.nav--solid .nav__logo .logo-dark{opacity:1;position:relative}
.nav__link{
  font-size:0.8125rem;font-weight:500;
  padding:0.5rem 0.875rem;border-radius:100px;
  color:rgba(255,255,255,0.85);white-space:nowrap;
  display:flex;align-items:center;gap:0.25rem;
  transition:color 0.2s,background 0.2s;
}
.nav__link:hover{color:#fff;background:rgba(255,255,255,0.1)}
.nav--solid .nav__link{color:var(--text-secondary)}
.nav--solid .nav__link:hover{color:var(--black);background:rgba(0,0,0,0.04)}
.nav__link svg{width:10px;height:10px;opacity:0.6}
.nav__login{
  font-size:0.8125rem;font-weight:500;
  padding:0.5rem 1rem;border-radius:100px;
  color:rgba(255,255,255,0.85);white-space:nowrap;
  border:1px solid rgba(255,255,255,0.3);
  transition:color 0.2s,border-color 0.2s,background 0.2s;
}
.nav__login:hover{color:#fff;border-color:rgba(255,255,255,0.5)}
.nav--solid .nav__login{color:var(--black);border-color:rgba(0,0,0,0.15)}
.nav--solid .nav__login:hover{border-color:var(--black)}
a.nav__cta{
  font-size:0.8125rem;font-weight:600;
  padding:0.5rem 1.125rem;border-radius:100px;
  white-space:nowrap;text-decoration:none;
  color:#fff;background:#111110;
  border:1px solid transparent;
  transition:all 0.3s ease;
}
a.nav__cta:hover{
  color:#111 !important;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-color:rgba(255,255,255,0.5);
  box-shadow:0 2px 12px rgba(0,0,0,0.08);
}
.nav--solid a.nav__cta{
  color:var(--black);
  background:rgba(0,0,0,0.04);
  border:1px solid rgba(0,0,0,0.1);
  box-shadow:0 1px 4px rgba(0,0,0,0.04);
}
.nav--solid a.nav__cta:hover{
  color:var(--black);
  background:rgba(0,0,0,0.08);
  border-color:rgba(0,0,0,0.18);
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
}
.nav__divider{
  width:1px;height:1rem;
  background:rgba(255,255,255,0.15);margin:0 0.125rem;
}
.nav--solid .nav__divider{background:rgba(0,0,0,0.08)}
.nav__dropdown{position:relative}
.nav__dropdown>.nav__link{cursor:pointer}
.nav__dropdown>.nav__link svg{transition:transform 0.25s}
.nav__dropdown.is-open>.nav__link svg{transform:rotate(180deg)}
.nav__dropdown-panel{
  position:absolute;top:calc(100% + 0.75rem);left:0;
  display:flex;
  background:rgba(255,255,255,0.97);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-radius:0.75rem;
  box-shadow:0 12px 48px rgba(0,0,0,0.12),0 2px 8px rgba(0,0,0,0.06);
  border:1px solid rgba(0,0,0,0.06);
  opacity:0;visibility:hidden;
  transform:translateY(-6px);
  transition:opacity 0.25s ease,visibility 0.25s ease,transform 0.25s ease;
  z-index:100;min-width:36rem;overflow:hidden;
}
.nav__dropdown.is-open .nav__dropdown-panel{
  opacity:1;visibility:visible;transform:translateY(0);
}
.nav__dropdown-left{
  flex:1;padding:1.5rem;
  display:flex;flex-direction:column;gap:0.25rem;
}
.nav__dropdown-item{
  display:block;padding:0.75rem 1rem;border-radius:0.5rem;
  transition:background 0.15s;
}
.nav__dropdown-item:hover{background:rgba(0,0,0,0.03)}
.nav__dropdown-item-title{
  font-size:0.875rem;font-weight:600;color:var(--black);
  margin-bottom:0.125rem;
}
.nav__dropdown-item-desc{
  font-size:0.8125rem;color:var(--text-secondary);line-height:1.4;
}
.nav__dropdown-right{
  width:16rem;background:var(--black);
  padding:1.5rem;
  display:flex;flex-direction:column;gap:0.125rem;
  border-radius:0 0.75rem 0.75rem 0;
}
.nav__dropdown-featured-label{
  font-size:0.6875rem;font-weight:600;text-transform:uppercase;
  letter-spacing:0.06em;color:rgba(255,255,255,0.4);
  padding:0.5rem 0.75rem;margin-bottom:0.25rem;
  display:flex;align-items:center;gap:0.5rem;
}
.nav__dropdown-featured-label::before{
  content:'';width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,0.5);
}
.nav__dropdown-featured-link{
  display:block;font-size:0.9375rem;font-weight:500;
  color:rgba(255,255,255,0.75);padding:0.625rem 0.75rem;
  border-radius:0.375rem;transition:color 0.15s,background 0.15s;
}
.nav__dropdown-featured-link:hover{
  color:#fff;background:rgba(255,255,255,0.08);
}
.nav-blur-overlay{
  position:fixed;inset:0;z-index:999;
  background:rgba(0,0,0,0.1);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  opacity:0;visibility:hidden;pointer-events:none;
  transition:opacity 0.35s ease,visibility 0.35s ease;
}
.nav-blur-overlay.is-active{opacity:1;visibility:visible}

@media(max-width:768px){
  .nav{padding:0.75rem 1rem}
  .nav__pill--left .nav__link{display:none}
  .nav__pill--left .nav__dropdown{display:none}
  .nav__pill--right .nav__link{display:none}
  .nav__pill--right .nav__divider{display:none}
  .nav__login{display:none}
}

/* =============================================
   DEMO PAGE (auth-style layout)
   ============================================= */
/* Video background */
.demo-video-bg{
  position:fixed;inset:0;z-index:0;
  overflow:hidden;
}
.demo-video-bg video{
  width:100%;height:100%;object-fit:cover;
  filter:blur(4px);
  transform:scale(1.02);/* prevents blur white edges */
}
.demo-video-bg::after{
  content:'';position:absolute;inset:0;
  background:rgba(0,0,0,0.55);
}

.auth-page{
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:7rem 1.5rem 3rem;
  position:relative;z-index:1;
}
.auth-header{
  text-align:center;
  margin-bottom:2rem;
}
.auth-header h1{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  font-size:clamp(1.75rem,3.5vw,2.25rem);
  font-weight:300;
  line-height:1.15;
  letter-spacing:-0.02em;
  color:#fff;
  margin-bottom:0.5rem;
}
.auth-header p{
  font-size:0.9375rem;
  color:rgba(255,255,255,0.55);
  line-height:1.5;
}
.auth-card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:1rem;
  padding:3rem;
  width:100%;
  max-width:32rem;
  box-shadow:0 8px 40px rgba(0,0,0,0.2);
}
.form-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:0.75rem;
}
@media(max-width:480px){
  .form-row{grid-template-columns:1fr}
}
.form-group{
  margin-bottom:1.25rem;
}
.form-group label{
  display:block;
  font-size:0.8125rem;
  font-weight:500;
  color:rgba(255,255,255,0.7);
  margin-bottom:0.375rem;
}
.form-group input[type="text"],
.form-group input[type="email"],
.form-group select,
.form-group textarea{
  width:100%;
  padding:0.75rem 1rem;
  border:1px solid rgba(255,255,255,0.15);
  border-radius:0.5rem;
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  font-size:0.9375rem;
  color:#fff;
  background:rgba(255,255,255,0.06);
  outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{
  border-color:rgba(255,255,255,0.4);
  box-shadow:0 0 0 3px rgba(255,255,255,0.06);
}
.form-group input::placeholder,
.form-group textarea::placeholder{
  color:rgba(255,255,255,0.3);
}
.form-group select{
  appearance:none;
  -webkit-appearance:none;
  background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='rgba(255,255,255,0.5)' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat:no-repeat;
  background-position:right 1rem center;
  padding-right:2.5rem;
  cursor:pointer;
}
.form-group select option{
  background:var(--black);color:#fff;
}
.form-group select:invalid{
  color:rgba(255,255,255,0.3);
}
.form-group textarea{
  resize:vertical;
  min-height:auto;
}
.btn-submit{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0.5rem;
  font-size:0.9375rem;
  font-weight:600;
  padding:0.875rem 1.5rem;
  border-radius:1.5rem;
  background:#fff;
  color:var(--black);
  border:1px solid transparent;
  cursor:pointer;
  transition:all 0.3s ease;
}
.btn-submit:hover{
  background:rgba(255,255,255,0.85);
  box-shadow:0 2px 12px rgba(0,0,0,0.15);
}
.btn-submit:disabled{
  opacity:0.6;
  cursor:not-allowed;
}
.btn-submit:disabled:hover{
  background:#fff;
  color:var(--black);
  box-shadow:none;
}
.form-hint{
  text-align:center;
  margin-top:0.75rem;
  font-size:0.8125rem;
  color:rgba(255,255,255,0.4);
  line-height:1.5;
}
.auth-email{
  text-align:center;
  margin-top:1.25rem;
  padding-top:1.25rem;
  border-top:1px solid rgba(255,255,255,0.08);
  font-size:0.8125rem;
  color:rgba(255,255,255,0.4);
}
.auth-email a{
  color:rgba(255,255,255,0.7);
  font-weight:500;
  border-bottom:1px solid rgba(255,255,255,0.2);
  padding-bottom:0.125rem;
  transition:color 0.2s,border-color 0.2s;
}
.auth-email a:hover{
  color:#fff;
  border-color:#fff;
}
.auth-wordmark{
  margin-top:3rem;
  text-align:center;
}
.auth-wordmark a{
  display:inline-block;
  opacity:0.15;
  transition:opacity 0.2s;
}
.auth-wordmark a:hover{
  opacity:0.3;
}
.auth-wordmark svg{
  height:1.25rem;
  width:auto;
}

@media(max-width:480px){
  .auth-card{
    padding:2rem 1.5rem;
    border-radius:0.75rem;
  }
  .auth-page{
    padding:6rem 1rem 2rem;
  }
}
</style>
</head>
<body>

<!-- Video background -->
<div class="demo-video-bg">
  <video autoplay muted loop playsinline>
    <source src="assets/brain-1-web.mp4" type="video/mp4">
  </video>
</div>

<div id="team-nav" data-theme="dark"></div>

<main class="auth-page">
  <div class="auth-header">
    <h1>Book a demo</h1>
    <p>See how Team can streamline your release workflow.<br>Meet a founder — not a sales rep.</p>
  </div>

  <!-- TODO: Also POST form data to HubSpot before redirect -->
  <form class="auth-card" id="demoForm" action="#" method="POST" data-hubspot-form="demo">
    <div class="form-row">
      <div class="form-group">
        <label for="firstName">First name</label>
        <input type="text" id="firstName" name="first_name" placeholder="Jane" required>
      </div>
      <div class="form-group">
        <label for="lastName">Last name</label>
        <input type="text" id="lastName" name="last_name" placeholder="Doe" required>
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email address</label>
      <input type="email" id="email" name="email" placeholder="you@yourlabel.com" required>
    </div>

    <div class="form-group">
      <label for="orgName">Organization / Label name</label>
      <input type="text" id="orgName" name="organization" placeholder="Your label, company, or team name">
    </div>

    <div class="form-group">
      <label for="role">Role</label>
      <select id="role" name="role" required>
        <option value="" disabled selected hidden>Select your role</option>
        <option value="Artist">Artist</option>
        <option value="Manager">Manager</option>
        <option value="Label">Label</option>
        <option value="Distributor">Distributor</option>
        <option value="Marketing / PR">Marketing / PR</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <div class="form-group">
      <label for="artistCount">Number of artists you manage</label>
      <select id="artistCount" name="artist_count" required>
        <option value="" disabled selected hidden>Select a range</option>
        <option value="1">1</option>
        <option value="2-5">2-5</option>
        <option value="6-20">6-20</option>
        <option value="21-50">21-50</option>
        <option value="50+">50+</option>
      </select>
    </div>

    <div class="form-group">
      <label for="interest">What are you most interested in?</label>
      <textarea id="interest" name="interest" rows="3" placeholder="Tell us about your workflow or what you'd like to see..."></textarea>
    </div>

    <button type="submit" class="btn-submit" id="submitBtn">Continue to pick a time</button>
    <p class="form-hint">You'll be redirected to our calendar to choose a time slot.</p>
    <p class="auth-email">Or email us directly at <a href="mailto:hello@teamrollouts.com">hello@teamrollouts.com</a></p>
  </form>

<script>
(function() {
  // Cutover swap: change to https://app.teamrollouts.com/... when DNS flips
  var WEBHOOK_URL = 'https://teamrollouts.com/api/webhooks/webflow/demo';

  var form = document.getElementById('demoForm');
  var submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', function(e) {
    e.preventDefault();

    var firstName = document.getElementById('firstName').value.trim();
    var lastName = document.getElementById('lastName').value.trim();
    var email = document.getElementById('email').value.trim();
    var organization = document.getElementById('orgName').value.trim();
    var role = document.getElementById('role').value;
    var artistCount = document.getElementById('artistCount').value;
    var interest = document.getElementById('interest').value.trim();

    submitBtn.disabled = true;
    submitBtn.textContent = 'Redirecting to calendar...';

    // Fire-and-forget POST to platform (DB record + admin email + HubSpot sync).
    // Non-blocking so a webhook failure never blocks Calendly booking.
    fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        firstName: firstName,
        lastName: lastName,
        email: email,
        organization: organization,
        role: role,
        artistCount: artistCount,
        interest: interest
      })
    }).catch(function(err) {
      console.warn('Demo webhook POST failed (continuing to Calendly):', err);
    });

    // Build Calendly URL with pre-filled params
    var baseUrl = 'https://calendly.com/teamrollouts-demo/30min';
    var params = new URLSearchParams();
    params.set('name', firstName + ' ' + lastName);
    params.set('email', email);
    params.set('back', '1');
    params.set('hide_landing_page_details', '1');
    params.set('hide_gdpr_banner', '1');
    params.set('background_color', 'ffffff');
    params.set('text_color', '191919');
    params.set('primary_color', '5679b5');

    var calendlyUrl = baseUrl + '?' + params.toString();

    // Brief delay for UX, then redirect
    setTimeout(function() {
      window.location.href = calendlyUrl;
    }, 500);
  });
})();
</script>
