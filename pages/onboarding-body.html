
<!-- Ambient drifting gradient (endless loop, no scroll tied) -->
<div class="onboarding-bg" aria-hidden="true">
  <div class="onboarding-bg__wash"></div>
  <div class="onboarding-bg__blob onboarding-bg__blob--left" id="onbBlobLeft"></div>
  <div class="onboarding-bg__blob onboarding-bg__blob--primary" id="onbBlob1"></div>
  <div class="onboarding-bg__blob onboarding-bg__blob--secondary" id="onbBlob2"></div>
  <div class="onboarding-bg__blob onboarding-bg__blob--tertiary" id="onbBlobT"></div>
</div>


<main class="auth-page">
  <div class="auth-header">
    <h1>Start your free trial</h1>
    <p>60 days of full access. No credit card required.</p>
  </div>

  <!-- TODO: Wire form POST to Team platform API + HubSpot -->
  <!-- TODO: Promo code field needs to parse code in submission URL to platform for validation -->
  <form class="auth-card" id="onboardingForm" action="#" method="POST" data-hubspot-form="onboarding">
    <div class="form-row">
      <div class="form-group">
        <label for="firstName">First name</label>
        <input type="text" id="firstName" name="first_name" placeholder="Jane" required>
      </div>
      <div class="form-group">
        <label for="lastName">Last name</label>
        <input type="text" id="lastName" name="last_name" placeholder="Doe" required>
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email address</label>
      <input type="email" id="email" name="email" placeholder="you@yourlabel.com" required>
    </div>

    <div class="form-group">
      <label for="orgName" id="orgLabel">Organization name</label>
      <input type="text" id="orgName" name="organization" placeholder="Your label, company, or team name">
    </div>

    <div class="form-group">
      <label>Choose your plan</label>
      <div class="plan-selector" role="radiogroup" aria-label="Plan">
        <button type="button" class="plan-option" data-plan="free" role="radio" aria-checked="false">
          <div class="plan-option__head">
            <span class="plan-option__name">Free</span>
            <span class="plan-option__check" aria-hidden="true"></span>
          </div>
          <div class="plan-option__tagline">For solo artists getting started</div>
          <div class="plan-option__price" data-price></div>
          <div class="plan-option__sub" data-sub></div>
        </button>
        <button type="button" class="plan-option plan-option--active" data-plan="pro" role="radio" aria-checked="true">
          <div class="plan-option__head">
            <span class="plan-option__name">Pro</span>
            <span class="plan-option__check" aria-hidden="true"></span>
          </div>
          <div class="plan-option__tagline">For artists, managers, indie labels & teams</div>
          <div class="plan-option__price" data-price></div>
          <div class="plan-option__sub" data-sub></div>
        </button>
        <button type="button" class="plan-option" data-plan="enterprise" role="radio" aria-checked="false">
          <div class="plan-option__head">
            <span class="plan-option__name">Enterprise</span>
            <span class="plan-option__check" aria-hidden="true"></span>
          </div>
          <div class="plan-option__tagline">Major labels and custom deployments</div>
          <div class="plan-option__price" data-price></div>
          <div class="plan-option__sub" data-sub></div>
        </button>
      </div>

      <div class="term-selector" role="radiogroup" aria-label="Billing period" id="termSelector">
        <button type="button" class="term-option term-option--active" data-term="yearly" role="radio" aria-checked="true">
          Yearly
          <span class="term-save">Save 20%</span>
        </button>
        <button type="button" class="term-option" data-term="monthly" role="radio" aria-checked="false">
          Monthly
        </button>
      </div>

      <div class="plan-note" id="planNote" hidden></div>

      <a href="/pricing" class="change-plan-link">Explore plans</a>
    </div>

    <!-- Promo code (hidden by default) -->
    <div class="promo-toggle">
      <a href="#" id="promoToggle" class="change-plan-link">Got a promo code?</a>
    </div>
    <div class="form-group promo-field" id="promoField" style="display:none;">
      <label for="promoCode">Promo code</label>
      <input type="text" id="promoCode" name="promo_code" placeholder="Enter your code">
    </div>

    <input type="hidden" name="plan" id="hiddenPlan" value="pro">
    <input type="hidden" name="period" id="hiddenPeriod" value="yearly">

    <div class="checkbox-group">
      <input type="checkbox" id="agreeTerms" name="agree_terms" required>
      <label for="agreeTerms">I agree to the <a href="/terms">Terms of Service</a> and <a href="/privacy">Privacy Policy</a>, and consent to receiving product updates, tips, and occasional marketing communications. You can unsubscribe at any time.</label>
    </div>

    <button type="submit" class="btn-submit" id="submitBtn">Start my first release</button>
  </form>

  <div class="auth-footer">
    <p>Already have an account? <a href="/sign-in">Sign in</a></p>
  </div>

  <p class="auth-legal">By creating an account, you agree to our <a href="/terms">Terms of Service</a> and <a href="/privacy">Privacy Policy</a></p>

    </a>
  </div>
</main>
