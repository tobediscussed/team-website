

<main class="auth-page">
  <div class="auth-header">
    <h1>Welcome back</h1>
    <p>Sign in to your Team account</p>
  </div>

  <!-- TODO: Wire form POST to Team platform auth API -->
  <form class="auth-card" id="signInForm" action="#" method="POST">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@yourlabel.com" required>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="password-wrapper">
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
        <button type="button" class="password-toggle" data-target="password">Show</button>
      </div>
      <a href="#" class="forgot-link">Forgot your password?</a>
    </div>

    <button type="submit" class="btn-submit" id="submitBtn">Sign in</button>
  </form>

  <div class="auth-footer">
    <p>Don't have an account? <a href="/onboarding">Start your free trial</a></p>
  </div>
